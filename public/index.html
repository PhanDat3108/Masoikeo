<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Sói Helper Pro</title>
    <style>
        :root { --primary: #e74c3c; --bg: #0f0f0f; --card-bg: #1e1e24; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2, h3 { color: var(--primary); text-transform: uppercase; text-align: center; margin-top: 0; }
        
        /* Input & Button */
        input, select { background: #2a2a32; border: 1px solid #444; color: white; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        button { border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 15px; }
        .btn-ready { background: #27ae60; color: white; }
        .btn-out { background: #7f8c8d; color: white; }
        .btn-kill { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 4px 8px; font-size: 12px; }
        .btn-kick { background: transparent; border: 1px solid #7f8c8d; color: #7f8c8d; padding: 4px 8px; font-size: 12px; margin-left: 5px; }
        .btn-kick:hover { background: #c0392b; color: white; border-color: #c0392b; }

        /* User List */
        .player-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid #333; }
        .is-dead { opacity: 0.4; text-decoration: line-through; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #444; margin-right: 5px; }
        .role-tag { font-size: 11px; color: #f1c40f; background: rgba(241, 196, 15, 0.1); padding: 2px 6px; border-radius: 4px; margin-left: 5px; border: 1px solid rgba(241, 196, 15, 0.3); }
        
        /* Role Settings */
        .role-config-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; background: #2a2a32; padding: 8px; border-radius: 6px; }
        .role-name { flex: 1; font-weight: bold; }
        .role-count { width: 30px; text-align: center; font-size: 1.1em; }
        .admin-controls { border-top: 3px solid var(--primary); margin-top: 20px; }
        .logout-link { display: block; text-align: center; color: #888; font-size: 12px; margin-top: 10px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div id="login" class="card">
            <h2>🐺 MA SÓI NHÓM KÈO</h2>
            <input type="text" id="username" placeholder="Nhập tên của bạn...">
            <button class="btn-main" onclick="join()">VÀO PHÒNG</button>
        </div>

        <div id="game" style="display:none">
            <div class="card" id="myRoleCard" style="border-left: 5px solid var(--primary);">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <small>Bạn là:</small>
                        <div id="roleDisplay" style="font-size: 1.5em; font-weight: bold; color: var(--primary);">...</div>
                    </div>
                    <button id="btnStatus" onclick="toggleStatus()"></button>
                </div>
            </div>

            <div class="card">
                <h3>Người chơi (<span id="countReady">0</span>)</h3>
                <div id="playerList"></div>
                <div class="logout-link" onclick="logout()">Thoát khỏi phòng và đổi tên</div>
            </div>

            <div id="adminPanel" class="card admin-controls" style="display:none">
                <h3>Cài đặt vai trò</h3>
                <div id="roleList"></div>
                
                <div style="display: flex; gap: 5px; margin-top: 15px;">
                    <input type="text" id="newRoleName" placeholder="Tên vai trò...">
                    <input type="number" id="newRoleCount" value="1" style="width: 70px;">
                    <button class="btn-ready" onclick="addRole()">+</button>
                </div>
                
                <button class="btn-main" onclick="shuffle()" style="margin-top: 20px; font-size: 1.1em;">XÀO BÀI & BẮT ĐẦU</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let state = {};

        // 1. TỰ ĐỘNG KẾT NỐI KHI LOAD TRANG
        window.onload = () => {
            const savedName = localStorage.getItem('ms_name');
            const savedId = localStorage.getItem('ms_secret_id');
            
            if (savedName && savedId) {
                // Nếu đã có thông tin, tự động gửi join luôn
                socket.emit('join', { name: savedName, secretId: savedId });
            }
        };

        function join() {
            const nameInput = document.getElementById('username').value.trim();
            if(!nameInput) return;

            let secretId = localStorage.getItem('ms_secret_id');
            if (!secretId) {
                secretId = 'uid_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('ms_secret_id', secretId);
            }
            
            localStorage.setItem('ms_name', nameInput);
            socket.emit('join', { name: nameInput, secretId: secretId });
        }

        // 2. LOGOUT: CHỈ KHI BẤM THOÁT MỚI XÓA DỮ LIỆU
        function logout() {
            if(confirm("Bạn muốn thoát hẳn khỏi phòng này?")) {
                localStorage.removeItem('ms_name');
                localStorage.removeItem('ms_secret_id');
                location.reload();
            }
        }

        socket.on('errorMsg', (m) => alert(m));

        socket.on('youAreKicked', () => {
            alert("Bạn đã bị Quản trò mời ra khỏi phòng!");
            localStorage.removeItem('ms_name');
            localStorage.removeItem('ms_secret_id');
            location.reload(); 
        });

        socket.on('updateState', (s) => {
            state = s;
            const me = state.players.find(p => p.id === socket.id);
            
            if (me) {
                document.getElementById('login').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                document.getElementById('roleDisplay').innerText = me.role;
                
                const btnStatus = document.getElementById('btnStatus');
                if (me.isAdmin) {
                    btnStatus.style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    renderAdminSettings();
                } else {
                    btnStatus.style.display = 'block';
                    btnStatus.innerText = me.isReady ? "THOÁT VÁN" : "VÀO VÁN";
                    btnStatus.className = me.isReady ? "btn-out" : "btn-ready";
                }
                
                renderPlayerList(me);
            }
        });

        function renderPlayerList(me) {
            const playerList = document.getElementById('playerList');
            playerList.innerHTML = '';
            let readyCount = 0;

            state.players.forEach(p => {
                if(p.isReady && !p.isAdmin) readyCount++;
                const div = document.createElement('div');
                div.className = `player-row ${p.isAlive ? '' : 'is-dead'}`;
                
                const roleInfo = me.isAdmin && p.isReady && !p.isAdmin ? `<span class="role-tag">${p.role}</span>` : '';

                div.innerHTML = `
                    <span>
                        <span class="badge" style="color:${p.isReady?'#27ae60':'#888'}">${p.isReady?'●':'○'}</span>
                        <strong>${p.name}</strong> ${p.isAdmin ? '(QT)' : ''}
                        ${roleInfo}
                    </span>
                    <div style="display: flex;">
                        ${me.isAdmin && !p.isAdmin ? `
                            <button class="btn-kill" onclick="toggleLife('${p.id}')">${p.isAlive?'Giết':'Sống'}</button>
                            <button class="btn-kick" onclick="kick('${p.id}')">Kick</button>
                        ` : ''}
                    </div>
                `;
                playerList.appendChild(div);
            });
            document.getElementById('countReady').innerText = readyCount;
        }

        function renderAdminSettings() {
            const container = document.getElementById('roleList');
            container.innerHTML = '';
            state.rolesConfig.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'role-config-row';
                div.innerHTML = `
                    <span class="role-name">${r.name}</span>
                    <button onclick="updateCount(${i}, -1)">-</button>
                    <span class="role-count">${r.count}</span>
                    <button onclick="updateCount(${i}, 1)">+</button>
                    <button onclick="removeRole(${i})" style="color:red; background:none; font-size:18px;">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function updateCount(i, delta) {
            let conf = [...state.rolesConfig];
            conf[i].count = Math.max(0, conf[i].count + delta);
            socket.emit('updateConfig', conf);
        }

        function addRole() {
            const name = document.getElementById('newRoleName').value;
            const count = parseInt(document.getElementById('newRoleCount').value);
            if(!name) return;
            socket.emit('updateConfig', [...state.rolesConfig, {name, count}]);
            document.getElementById('newRoleName').value = '';
            document.getElementById('newRoleCount').value = 1;
        }

        function removeRole(i) {
            if(confirm("Xóa vai trò này?")) {
                let conf = [...state.rolesConfig];
                conf.splice(i, 1);
                socket.emit('updateConfig', conf);
            }
        }

        function toggleStatus() {
            const me = state.players.find(p => p.id === socket.id);
            socket.emit('setStatus', !me.isReady);
        }

        function toggleLife(id) { socket.emit('toggleLife', id); }

        function kick(id) {
            if(confirm("Đuổi người này khỏi phòng?")) {
                socket.emit('kickPlayer', id);
            }
        }
function logout() {
            if(confirm("Bạn muốn thoát hẳn khỏi phòng này?")) {
                // Gửi lệnh lên server để xóa tên khỏi danh sách ngay lập tức
                socket.emit('leaveRoom');
                
                // Sau đó mới xóa dữ liệu ở máy và load lại trang
                localStorage.removeItem('ms_name');
                localStorage.removeItem('ms_secret_id');
                
                // Đợi một chút xíu để lệnh gửi đi rồi mới reload
                setTimeout(() => {
                    location.reload();
                }, 100);
            }
        }
        function shuffle() {
            if(confirm("Xác nhận xào bài ván mới và hồi sinh tất cả?")) {
                socket.emit('shuffleCards');
            }
        }
    </script>
</body>
</html>
