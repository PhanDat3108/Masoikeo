<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Sói: Huyết Nguyệt Đêm Xuân</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
    font-family: 'UTM Ong Do';
    src: url('/fonts/00152-UTM-Ong-Do-Gia.ttf') format('truetype');
}
        /* --- HỆ THỐNG MÀU SẮC TẾT CỔ TRUYỀN --- */
        :root {
            --crimson: #8e0000;
            --bright-red: #d32f2f;
            --gold: #ffd700;
            --gold-light: #fff176;
            --midnight: #0f172a;
            --glass-bg: rgba(20, 20, 30, 0.85);
            --paper: #fff8e1;
            --border-gold: 1px solid rgba(255, 215, 0, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--midnight);
            /* Họa tiết mây cổ truyền hoặc lưới ô vuông chìm */
            background-image: 
                radial-gradient(circle at 50% 0%, #4a0000 0%, var(--midnight) 100%),
                url("https://www.transparenttextures.com/patterns/oriental-tiles.png");
            color: var(--paper);
            margin: 0; padding: 20px 15px;
            min-height: 100vh;
            line-height: 1.6;
        }

        /* --- HIỆU ỨNG ĐÈN LỒNG --- */
        .lantern-container { position: fixed; top: 0; width: 100%; height: 100px; z-index: 0; pointer-events: none; display: flex; justify-content: space-around; }
        .lantern { width: 35px; height: 45px; background: radial-gradient(circle at 50% 50%, #ff5252, var(--crimson)); border-radius: 12px; box-shadow: 0 0 15px rgba(255, 82, 82, 0.5); position: relative; animation: swing 3s infinite ease-in-out alternate; }
        .lantern::before { content: ''; position: absolute; top: -15px; left: 16px; width: 2px; height: 15px; background: #5d0000; }
        .lantern::after { content: ''; position: absolute; bottom: -8px; left: 12px; width: 10px; height: 10px; background: var(--gold); border-radius: 2px; }
        @keyframes swing { from { transform: rotate(-6deg); } to { transform: rotate(6deg); } }

        /* --- BỐ CỤC HÀNG DỌC --- */
        .main-layout {
            display: flex; flex-direction: column; gap: 25px;
            max-width: 480px; margin: 0 auto; width: 100%;
            position: relative; z-index: 1;
        }

        /* --- KHUNG KÍNH MỜ SANG TRỌNG --- */
        .glass-card {
            background: var(--glass-bg);
            border: var(--border-gold);
            border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }
        /* Hoa văn góc khung bài */
        .glass-card::before { content: '✤'; position: absolute; top: 5px; left: 8px; color: var(--gold); opacity: 0.4; font-size: 12px; }
        .glass-card::after { content: '✤'; position: absolute; bottom: 5px; right: 8px; color: var(--gold); opacity: 0.4; font-size: 12px; }

        h1, h2, h3 { font-family: 'Dancing Script', cursive; color: var(--gold); text-align: center; margin: 0 0 15px 0; }
        h1 { font-size: 3.2em; text-shadow: 0 0 15px rgba(255, 215, 0, 0.4); margin-bottom: 5px; }

        /* --- DANH SÁCH & XẾP HẠNG --- */
        .scroll-box {
            max-height: 220px; overflow-y: auto; padding-right: 8px;
        }
        .scroll-box::-webkit-scrollbar { width: 4px; }
        .scroll-box::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .player-row, .rank-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 10px; border-bottom: 1px solid rgba(255,215,0,0.1); 
            background: rgba(255,255,255,0.03); margin-bottom: 6px; border-radius: 6px;
        }
        .is-dead { opacity: 0.4; text-decoration: line-through; filter: grayscale(1); }
        .role-tag { font-size: 0.7em; background: var(--gold); color: var(--crimson); padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 8px; box-shadow: 0 0 8px var(--gold); }

        /* --- KHU VỰC THẺ BÀI --- */
        .flip-card {
            background-color: transparent;
            width: 250px; height: 380px; 
            perspective: 1000px; margin: 0 auto 20px auto; 
            cursor: pointer; display: none;
        }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; }
        .flip-card-inner.flipped { transform: rotateY(180deg); }

        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%;
            -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 15px; border: 3px solid var(--gold);
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); overflow: hidden;
            
        }

        .flip-card-front {
            background: var(--crimson) url('/picture/Gemini_Generated_Image_89i5p989i5p989i5.png') center/cover no-repeat;
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 30px;
        }
        .flip-card-front h2 { font-size: 1.1em; color: var(--paper); opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; }

        .flip-card-back {
            background: var(--paper) url("https://www.transparenttextures.com/patterns/cream-paper.png");
            transform: rotateY(180deg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 0; /* Đặt về 0 để ảnh tràn ra mép */
    
    overflow: hidden;
    
        }
        .role-img { 
    width: 100%; 
    height: 100%; 
    /* CŨ: object-fit: contain; */
    object-fit: cover; 
    
    /* 3. QUAN TRỌNG: Muốn to lên thì chỉnh số này */
    /* 1.0 là vừa khít. 1.2 là to hơn 20%. 1.5 là to rưỡi. */
    transform: scale(1.03); 
    
     /* MỚI: Ảnh sẽ phóng to lấp đầy khung, phần thừa tự ẩn */
    /* CŨ: padding: 15px; */
    padding: 0; /* MỚI: Bỏ hoàn toàn khoảng đệm */
    
    /* Thêm dòng này để ảnh cũng được bo tròn góc theo khung bài cho đẹp */
    border-radius: 12px; 
}

        /* --- SỐ ĐẾM NGƯỢC --- */
        .countdown {
            font-size: 7em; font-weight: bold; color: var(--gold); text-shadow: 0 0 20px #ff0000;
            background: rgba(0,0,0,0.8); border-radius: 50%; width: 140px; height: 140px; line-height: 140px;
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10;
        }

        /* --- HỆ THỐNG NÚT BẤM --- */
        button { 
            border: none; border-radius: 8px; font-weight: 700; cursor: pointer; 
            text-transform: uppercase; width: 100%; transition: all 0.3s ease;
            letter-spacing: 1px; font-size: 1em;
        }
        
        /* Nút Đỏ chính (mô phỏng lụa) */
        .btn-main { 
            padding: 14px; 
            background: linear-gradient(135deg, #b71c1c, #8e0000); 
            color: var(--gold); border: 1px solid var(--gold);
            box-shadow: 0 4px 15px rgba(183, 28, 28, 0.4);
        }
        .btn-main:active { transform: scale(0.96); }

        /* Nút Sẵn sàng (Xanh ngọc bích) */
        .btn-ready { 
            padding: 14px; 
            background: linear-gradient(135deg, #004d40, #00695c); 
            color: #e0f2f1; border: 1px solid #4db6ac;
        }

        /* Nút Chờ (Xám đen) */
        .btn-wait { padding: 14px; background: #262626; color: #888; border: 1px solid #444; }

        /* --- ADMIN CONTROLS --- */
        .admin-controls select { 
            width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px;
            background: rgba(0,0,0,0.5); border: 1px solid var(--gold); color: var(--paper); 
        }
        .role-config-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.3); padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);
        }
        .btn-mini { width: 32px; height: 32px; line-height: 30px; padding: 0; background: var(--paper); color: var(--midnight); }
        .btn-win { padding: 12px; margin-top: 8px; color: white; border-radius: 6px; font-size: 0.9em; }
        .win-villager { background: #1b5e20; } 
        .win-wolf { background: #b71c1c; } 
        .win-couple { background: #880e4f; }
        .btn-couple { background: #ad1457; color: white; padding: 12px; margin-top: 10px; }

        /* LOGIN */
        #login { max-width: 380px; margin: 12vh auto; text-align: center; }
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 14px; margin-bottom: 15px; 
            background: rgba(0,0,0,0.6); border: 1px solid var(--gold); 
            color: var(--gold); border-radius: 8px; text-align: center; font-size: 1.1em;
            outline: none;
        }
        input::placeholder { color: rgba(255, 215, 0, 0.4); }
    </style>
</head>
<body>
    <div class="lantern-container">
        <div class="lantern" style="left: 10%; animation-delay: 0s;"></div>
        <div class="lantern" style="left: 30%; animation-delay: 1s;"></div>
        <div class="lantern" style="left: 70%; animation-delay: 0.5s;"></div>
        <div class="lantern" style="left: 90%; animation-delay: 1.5s;"></div>
    </div>

    <div id="login" class="glass-card">
        <h1 style="font-family: 'UTM Ong Do';font-size: 80px;">Ma Sói</h1>
        <h2 style="font-size: 1.2em; letter-spacing: 3px; color: var(--paper); opacity: 0.8;font-family: 'UTM Ong Do';">ANH EM KÈO</h2>
        <img src="picture/unnamed-removebg-preview copy.png" style="width: 180px; margin: 10px 0 25px 0; filter: drop-shadow(0 0 10px var(--bright-red));">
        <input type="text" id="username" placeholder="Thỉnh danh tánh...">
        <button class="btn-ready" onclick="join()">Bắt Đầu </button>
    </div>

    <div id="game" class="main-layout" style="display:none">
        
        <div class="glass-card">
            <h3>Danh Sách Bản Thôn</h3>
            <div id="playerList" class="scroll-box"></div>
            <div onclick="logout()" style="text-align:center; margin-top:15px; color:#888; font-size:0.85em; text-decoration:underline; cursor:pointer;">Cáo biệt bản thôn</div>
        </div>

        <div class="glass-card" style="text-align: center;">
            
            <div id="myCardArea" class="flip-card" onclick="flipCard()">
                <div class="flip-card-inner" id="cardInner">
                    <div class="flip-card-front">
                        <div id="countdownNum" class="countdown">5</div>
                        <h2></h2>
                    </div>
                    <div class="flip-card-back">
                        <img id="roleImage" src="" class="role-img">
                    </div>
                </div>
            </div>

            <div id="actionButtons">
                <button id="btnStatus" onclick="toggleStatus(event)" class="btn-ready">SẴN SÀNG </button>
            </div>

            <div id="adminPanel" class="admin-controls" style="display:none">
                <h3 style="border-bottom: 1px solid var(--gold); padding-bottom: 10px;">Quyền Năng Quản Trò</h3>
                <div style="margin-bottom:15px; color:var(--gold); font-size: 0.9em; font-weight: bold;">Huyết nguyệt trận thứ: <span id="matchCountDisplay">0</span></div>
                
                <button class="btn-main" onclick="shuffle()" style="margin-bottom: 20px;">Xào Bài Khai Cuộc</button>

                <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed var(--gold);">
                    <div style="color:var(--gold); font-weight:bold; margin-bottom:12px; font-size: 0.9em;"> ĐIỀU CHỈNH NHÂN SỰ</div>
                    <div id="roleConfigList"></div>
                    <div style="display:flex; gap:8px; margin-top:12px;">
                        <input type="text" id="newRoleName" placeholder="Tên Vai..." style="margin:0; flex:2; font-size:0.9em; padding:10px;">
                        <input type="number" id="newRoleCount" value="1" style="margin:0; width:60px; font-size:0.9em; padding:10px;">
                        <button class="btn-mini" style="background:var(--gold); width:45px" onclick="addNewRole()">+</button>
                    </div>
                </div>

                <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px dashed #ad1457;">
                    <div style="color:#e91e63; font-weight:bold; margin-bottom:10px; font-size: 0.9em;">Cupid</div>
                    <select id="couple1"></select>
                    <select id="couple2"></select>
                    <button class="btn-main" onclick="setCouple()">Se Duyên </button>
                </div>

                <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px;">
                    <div style="color:#fff; font-weight:bold; margin-bottom:10px; font-size: 0.9em;">Phán Quyết Cuối Cùng</div>
                    <button class="btn-win win-villager" onclick="endGame('VILLAGER')">Bản Thôn Thắng</button>
                    <button class="btn-win win-wolf" onclick="endGame('WEREWOLF')">Ma Sói Thắng</button>
                    <button class="btn-win win-couple" onclick="endGame('COUPLE')">Uyên Ương Thắng</button>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h3>Bảng Phong Thần</h3>
            <div id="leaderboard" class="scroll-box"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
    const socket = io();
    let state = {};
    let myRole = "...";
    let canFlip = false;

    const roleImages = {
        'Sói': 'picture/soi.jpg', 
        'Dân Ngu': 'picture/Danngu.jpg',
        'Tiên tri': 'picture/tientri.jpg',
        'Bảo vệ': 'picture/baove.jpg',
        'Thợ săn': 'picture/thosan.jpg',
        'Phù Thuỷ': 'picture/phuthuy.jpg',
        'Kẻ Bị Nguyền': 'picture/sida.jpg',
        'Sida': 'picture/chandoi.jpg',
        'default': 'picture/logo-masoi.jpg'
    };

    window.onload = () => {
        const n = localStorage.getItem('ms_name');
        const i = localStorage.getItem('ms_id');
        if(n && i) socket.emit('join', {name:n, secretId:i});
    };

    function join() {
        const n = document.getElementById('username').value.trim();
        if(!n) return;
        let i = localStorage.getItem('ms_id') || Math.random().toString(36).substr(2);
        localStorage.setItem('ms_id', i); localStorage.setItem('ms_name', n);
        socket.emit('join', {name:n, secretId:i});
    }

    socket.on('updateMatchCount', (c) => {
        const el = document.getElementById('matchCountDisplay');
        if(el) el.innerText = c;
    });

    socket.on('updateState', (s) => {
        state = s;
        const me = state.players.find(p => p.id === socket.id);
        if(me) {
            myRole = me.role;
            document.getElementById('login').style.display = 'none';
            document.getElementById('game').style.display = 'flex';

            if(me.isAdmin) {
                document.getElementById('myCardArea').style.display = 'none';
                document.getElementById('actionButtons').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                updateCoupleSelects();
                if(state.rolesConfig) renderRoleConfig(state.rolesConfig);
            } else {
                document.getElementById('myCardArea').style.display = 'block';
                document.getElementById('actionButtons').style.display = 'block';
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('roleImage').src = roleImages[me.role] || roleImages['default'];
                
                if(!canFlip) {
                    const btn = document.getElementById('btnStatus');
                    btn.innerText = me.isReady ? "ĐANG ĐỢI KHAI CUỘC..." : "SẴN SÀNG NHẬN LỘC";
                    btn.className = me.isReady ? "btn-wait" : "btn-ready";
                    btn.onclick = toggleStatus;
                }
            }
            renderPlayerList(me);
        }
    });

    function renderRoleConfig(roles) {
        const container = document.getElementById('roleConfigList');
        if(!container) return;
        container.innerHTML = '';
        roles.forEach((role, index) => {
            container.innerHTML += `
                <div class="role-config-item">
                    <span style="color:var(--gold); font-weight:bold; font-size:0.9em;">${role.name}</span>
                    <div class="role-controls">
                        <button class="btn-mini" onclick="updateRoleCount(${index}, -1)">-</button>
                        <span style="min-width:30px; text-align:center; font-weight:bold; color:white">${role.count}</span>
                        <button class="btn-mini" onclick="updateRoleCount(${index}, 1)">+</button>
                        <button class="btn-mini" style="background:none; color:#f44336; font-size:1.2em" onclick="deleteRole(${index})">✕</button>
                    </div>
                </div>`;
        });
    }

    function updateRoleCount(i, d) {
        let c = [...state.rolesConfig];
        c[i].count = Math.max(0, c[i].count + d);
        socket.emit('updateConfig', c);
    }

    function addNewRole() {
        const n = document.getElementById('newRoleName').value.trim();
        const c = parseInt(document.getElementById('newRoleCount').value);
        if(n && c >= 0) {
            let cfg = [...state.rolesConfig, {name: n, count: c}];
            socket.emit('updateConfig', cfg);
            document.getElementById('newRoleName').value = '';
        }
    }

    function deleteRole(i) {
        if(confirm("Xóa vai trò này?")) {
            let c = [...state.rolesConfig];
            c.splice(i, 1);
            socket.emit('updateConfig', c);
        }
    }

    socket.on('startCountdown', () => {
        const inner = document.getElementById('cardInner');
        const countDiv = document.getElementById('countdownNum');
        const btn = document.getElementById('btnStatus');
        inner.classList.remove('flipped'); canFlip = false;
        countDiv.style.display = 'block';
        let c = 5; countDiv.innerText = c;
        const t = setInterval(() => {
            c--; countDiv.innerText = c;
            if(c <= 0) {
                clearInterval(t);
                countDiv.style.display = 'none';
                canFlip = true;
                btn.innerText = "MỞ LỘC KHAI XUÂN";
                btn.className = "btn-main"; 
                btn.onclick = flipCard;
            }
        }, 1000);
    });

    function flipCard() {
        if(!canFlip) return;
        const inner = document.getElementById('cardInner');
        const btn = document.getElementById('btnStatus');
        if(inner.classList.contains('flipped')) {
            inner.classList.remove('flipped');
        } else {
            inner.classList.add('flipped');
            btn.innerText = "VAI TRÒ: " + myRole.toUpperCase();
            btn.className = "btn-wait";
        }
    }

    function toggleStatus(e) { e.stopPropagation(); const me=state.players.find(p=>p.id===socket.id); socket.emit('setStatus', !me.isReady); }
    
   function renderPlayerList(me) {
    const list = document.getElementById('playerList'); 
    list.innerHTML = '';
    state.players.forEach(p => {
        if(p.isAdmin) return;
        let role = (me.isAdmin || p.id === socket.id) ? p.role : "???";
        if(me.isAdmin && state.couple && state.couple.includes(p.id)) role += " (❤️)";
        
        list.innerHTML += `
            <div class="player-row ${p.isAlive?'':'is-dead'}">
                <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                    <div>
                        <span style="color:${p.isReady?'#00e676':'#555'}; margin-right:8px">●</span>
                        <strong style="font-family:'UTM Ong Do'">${p.name}</strong> 
                        ${me.isAdmin ? `<span class="role-tag">${role}</span>` : ''}
                    </div>
                    ${me.isAdmin ? `
                    <div style="display:flex; gap:5px;">
                        ${p.role === 'Kẻ Bị Nguyền' ? `
                            <button onclick="socket.emit('transformToWolf', '${p.id}')" 
                                    style="background:#6a1b9a; color:white; width:auto; padding:5px 10px; font-size:0.7em">
                                🐺 HÓA SÓI
                            </button>
                        ` : ''}
                        
                        ${p.role === 'Sida' ? `
                            <button onclick="if(confirm('Treo cổ Sida? Cả làng thua, Sida thắng solo!')) socket.emit('endGame', 'SIDA_SOLO')" 
                                    style="background:#ff9800; color:black; width:auto; padding:5px 10px; font-size:0.7em">
                                ⚖️ TREO CỔ
                            </button>
                        ` : ''}

                        <button onclick="socket.emit('toggleLife','${p.id}')" style="background:#333; color:white; padding:5px 10px; font-size:0.8em; width:auto">${p.isAlive?'💀':'❤️'}</button>
                        <button onclick="socket.emit('kickPlayer','${p.id}')" style="background:none; color:#f44336; padding:0; font-size:1.2em; width:auto">✕</button>
                    </div>` : ''}
                </div>
            </div>`;
    });
}

    function updateCoupleSelects() {
        const s1=document.getElementById('couple1'); const s2=document.getElementById('couple2');
        if(!s1 || !s2) return;
        const v1=s1.value; const v2=s2.value;
        s1.innerHTML='<option value="">-- Người Thứ Nhất --</option>'; s2.innerHTML='<option value="">-- Người Thứ Hai --</option>';
        state.players.forEach(p=>{if(!p.isAdmin){const o=`<option value="${p.id}">${p.name}</option>`; s1.innerHTML+=o; s2.innerHTML+=o;}});
        s1.value=v1; s2.value=v2;
    }

    function setCouple(){ const p1=document.getElementById('couple1').value; const p2=document.getElementById('couple2').value; if(p1&&p2&&p1!==p2) socket.emit('setCouple',[p1,p2]); else alert("Thỉnh chọn hai vị khác nhau!"); }
    function endGame(t){ if(confirm("Xác nhận phán quyết kết thúc ván?")) socket.emit('endGame', t); }
    function shuffle(){ if(confirm("Xác nhận xào bài khai cuộc?")) socket.emit('shuffleCards'); }
function logout() { 
        if(confirm("Cáo biệt bản thôn?")) { 
            // 1. Gửi lệnh báo server xóa tên
            socket.emit('leaveRoom'); 
            
            // 2. Xóa dữ liệu trong máy
            localStorage.clear(); 
            
            // 3. QUAN TRỌNG: Chờ 100ms (0.1 giây) để tin nhắn kịp bay đến Server rồi mới F5
            setTimeout(() => {
                location.reload(); 
            }, 500);
        } 
    }    socket.on('forceLogout', (m) => { alert(m); localStorage.clear(); location.reload(); });
    socket.on('updateLeaderboard', (lb) => {
        const div = document.getElementById('leaderboard');
        div.innerHTML = '';
        Object.entries(lb).sort((a,b) => b[1]-a[1]).forEach(([n, s], i) => {
            div.innerHTML += `<div class="rank-row"><span style="color:${i===0?'var(--gold)':'inherit'}">${i+1}. ${n}</span><span style="font-weight:bold">${s} Trận Thắng</span></div>`;
        });
    });
</script>
</body>
</html>
